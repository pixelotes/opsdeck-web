site_name: OpsDeck Documentation
site_description: IT Operations & Governance Platform — User Guide, Deployment, and Architecture Reference
site_author: pixelotes
site_url: https://pixelotes.github.io/OpsDeck/docs/
use_directory_urls: true
repo_url: https://github.com/pixelotes/opsdeck
repo_name: pixelotes/opsdeck
edit_uri: ""
docs_dir: docs-content
site_dir: dist/docs

copyright: Copyright &copy; 2024–2026 pixelotes — Elastic License

theme:
  name: material
  language: en
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pixelotes/opsdeck

